<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자가면역성위염 — KAIG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark:  #085041;
    --green-mid:   #0F6E56;
    --green-light: #1D9E75;
    --green-pale:  #E1F5EE;
    --green-paler: #F0FAF6;
    --ink:         #1a1a1a;
    --ink-mid:     #4a4a4a;
    --ink-soft:    #7a7a7a;
    --rule:        rgba(0,0,0,0.08);
    --bg:          #f8f9f7;
    --white:       #ffffff;
    --amber:       #BA7517;
    --amber-pale:  #FAEEDA;
    --blue:        #185FA5;
    --blue-pale:   #E6F1FB;
    --coral:       #993C1D;
    --coral-pale:  #FAECE7;
    --radius-sm:   6px;
    --radius-md:   10px;
    --radius-lg:   16px;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--green-dark);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 rgba(255,255,255,0.08);
  }
  .header-inner {
    max-width: 820px;
    margin: 0 auto;
    padding: 14px 20px 12px;
  }
  .header-brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  .header-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .header-eng {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    letter-spacing: 0.04em;
  }
  .search-wrap {
    position: relative;
  }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px;
    padding: 8px 36px 8px 14px;
    font-size: 13px;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: background 0.2s, border-color 0.2s;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.45); }
  .search-input:focus {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.35);
  }
  .search-icon {
    position: absolute;
    right: 11px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.5;
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .main-wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* ── TOPIC PILLS ── */
  .topics-section { margin-bottom: 20px; }
  .topics-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .topics-scroll {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .topic-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--white);
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
    box-shadow: var(--shadow-card);
  }
  .topic-pill:hover {
    border-color: var(--green-light);
    color: var(--green-dark);
  }
  .topic-pill.active {
    background: var(--green-dark);
    border-color: var(--green-dark);
    color: #fff;
    box-shadow: 0 2px 8px rgba(8,80,65,0.25);
  }
  .topic-pill .pill-icon { font-size: 13px; }
  .topic-pill .pill-count {
    background: rgba(0,0,0,0.08);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
  }
  .topic-pill.active .pill-count {
    background: rgba(255,255,255,0.2);
  }

  /* ── SOURCE TOGGLE ── */
  .source-section {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .source-label {
    font-size: 11px;
    color: var(--ink-soft);
    margin-right: 2px;
  }
  .source-chip {
    padding: 4px 11px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--white);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .source-chip:hover { border-color: var(--green-light); color: var(--green-dark); }
  .source-chip.active {
    background: var(--green-pale);
    border-color: var(--green-mid);
    color: var(--green-dark);
  }

  /* ── RESULTS HEADER ── */
  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .results-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }
  .results-count {
    font-size: 12px;
    color: var(--ink-soft);
  }

  /* ── PAPER CARDS ── */
  .papers-list { display: flex; flex-direction: column; gap: 10px; }

  .paper-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: var(--shadow-card);
    animation: fadeUp 0.3s ease both;
  }
  .paper-card:hover {
    border-color: rgba(15,110,86,0.25);
    box-shadow: 0 4px 20px rgba(8,80,65,0.1);
    transform: translateY(-1px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 7px;
  }
  .card-journal {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--green-mid);
    text-transform: uppercase;
  }
  .card-year {
    font-size: 10px;
    color: var(--ink-soft);
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.45;
    margin-bottom: 6px;
    font-family: 'Noto Serif KR', serif;
  }
  .card-title-en {
    font-size: 11px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .panel-title-en {
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.45;
    margin-bottom: 6px;
  }
  .card-authors {
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .card-abstract {
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.6;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .badge-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .badge-green  { background: var(--green-pale); color: var(--green-dark); }
  .badge-blue   { background: var(--blue-pale);  color: var(--blue); }
  .badge-amber  { background: var(--amber-pale); color: var(--amber); }
  .badge-gray   { background: #f0efea; color: #5F5E5A; }
  .badge-coral  { background: var(--coral-pale); color: var(--coral); }
  .badge-purple { background: #EEEDFE; color: #3C3489; }
  .card-arrow {
    font-size: 16px;
    color: var(--green-light);
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .paper-card:hover .card-arrow { transform: translateX(3px); }

  /* ── DETAIL PANEL ── */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(8,80,65,0.18);
    backdrop-filter: blur(2px);
    align-items: flex-end;
    justify-content: center;
  }
  .detail-overlay.open {
    display: flex;
    animation: overlayIn 0.2s ease;
  }
  @keyframes overlayIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .detail-panel {
    background: var(--white);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 820px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 0 0 40px;
    animation: panelUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes panelUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .panel-handle {
    width: 36px;
    height: 4px;
    background: #ddd;
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .panel-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--rule);
  }
  .panel-journal {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--green-mid);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .panel-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .panel-authors {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .panel-badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .panel-body { padding: 18px 20px; }
  .panel-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
    margin-top: 18px;
  }
  .panel-section-title:first-child { margin-top: 0; }
  .panel-abstract {
    font-size: 13px;
    color: var(--ink-mid);
    line-height: 1.75;
    margin-bottom: 4px;
  }
  .panel-keypoints {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .panel-keypoints li {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.55;
  }
  .kp-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-light);
    margin-top: 5px;
    flex-shrink: 0;
  }
  .panel-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .meta-item {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .meta-label {
    font-size: 10px;
    color: var(--ink-soft);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .meta-value {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
  }
  .panel-actions {
    padding: 0 20px;
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .panel-btn {
    flex: 1;
    padding: 11px;
    border-radius: var(--radius-md);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--rule);
    background: var(--bg);
    color: var(--ink-mid);
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .panel-btn:hover { background: var(--green-pale); border-color: var(--green-mid); color: var(--green-dark); }
  .panel-btn.primary {
    background: var(--green-dark);
    border-color: var(--green-dark);
    color: #fff;
  }
  .panel-btn.primary:hover { background: var(--green-mid); }
  .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--bg);
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .close-btn:hover { background: var(--rule); }

  .sort-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sort-dropdown-wrap {
    position: relative;
  }
  .sort-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--white);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mid);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
    box-shadow: var(--shadow-card);
  }
  .sort-btn:hover, .sort-btn.open {
    border-color: var(--green-mid);
    color: var(--green-dark);
  }
  .sort-menu {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 6px);
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--radius-md);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 50;
    min-width: 140px;
    overflow: hidden;
    animation: fadeUp 0.15s ease;
  }
  .sort-menu.open { display: block; }
  .sort-option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 9px 14px;
    border: none;
    background: none;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink-mid);
    cursor: pointer;
    transition: background 0.1s;
  }
  .sort-option:hover { background: var(--green-paler); color: var(--green-dark); }
  .sort-option.active { color: var(--green-dark); font-weight: 600; }

  /* IF badge on card */
  .if-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--amber-pale);
    color: var(--amber);
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ── TTS BAR ── */
  .tts-bar {
    margin: 0 16px 12px;
    background: linear-gradient(135deg, var(--green-paler), #f0f8f5);
    border: 1px solid rgba(15,110,86,0.18);
    border-radius: var(--radius-md);
    padding: 12px 14px 10px;
    box-shadow: 0 1px 4px rgba(8,80,65,0.07);
  }
  .tts-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* 진행 바 — 클릭/터치 가능 */
  .tts-progress-bar {
    position: relative;
    width: 100%;
    height: 6px;
    background: rgba(8,80,65,0.12);
    border-radius: 3px;
    cursor: pointer;
    margin-bottom: 4px;
    touch-action: none;
  }
  .tts-progress-bar:hover { background: rgba(8,80,65,0.18); }
  .tts-progress-fill {
    height: 100%;
    background: var(--green-light);
    border-radius: 3px;
    width: 0%;
    pointer-events: none;
    transition: width 0.25s linear;
  }
  .tts-progress-thumb {
    position: absolute;
    top: 50%;
    left: 0%;
    transform: translate(-50%, -50%);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--green-dark);
    box-shadow: 0 1px 4px rgba(8,80,65,0.35);
    pointer-events: none;
    transition: left 0.25s linear;
    display: none;
  }
  .tts-progress-bar:hover .tts-progress-thumb,
  .tts-progress-bar:active .tts-progress-thumb { display: block; }
  .tts-seg-counter {
    font-size: 10px;
    color: var(--ink-soft);
    text-align: right;
    margin-bottom: 8px;
    min-height: 14px;
  }
  .tts-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .tts-skip-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid rgba(8,80,65,0.22);
    color: var(--green-dark);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .tts-skip-btn:hover { background: var(--green-pale); border-color: var(--green-mid); }
  .tts-play-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--green-dark);
    border: none;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(8,80,65,0.25);
  }
  .tts-play-btn:hover { background: var(--green-mid); transform: scale(1.05); }
  .tts-play-btn.playing { background: #B85C00; }
  .tts-voice-toggle { display: none; }
  .tts-stop-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid rgba(8,80,65,0.2);
    color: var(--ink-soft);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .tts-stop-btn:hover { background: var(--coral-pale); border-color: var(--coral); color: var(--coral); }

  /* ── ADD MODAL ── */
  .add-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(8,80,65,0.22);
    backdrop-filter: blur(3px);
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .add-overlay.open { display: flex; animation: overlayIn 0.2s ease; }
  .add-modal {
    background: var(--white);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 620px;
    max-height: 96vh;
    overflow-y: auto;
    padding: 24px 22px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  }
  .add-modal h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .add-modal h2 span { font-size: 20px; }
  .add-field { margin-bottom: 13px; }
  .add-field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 5px;
  }
  .add-field label .req { color: var(--coral); margin-left: 2px; }
  .add-field input, .add-field textarea, .add-field select {
    width: 100%;
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    padding: 8px 11px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }
  .add-field input:focus, .add-field textarea:focus, .add-field select:focus {
    border-color: var(--green-mid);
    background: var(--white);
  }
  .add-field textarea { min-height: 80px; }
  .add-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .add-topics-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .topic-check {
    display: none;
  }
  .topic-check-label {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--white);
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-mid);
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }
  .topic-check:checked + .topic-check-label {
    background: var(--green-dark);
    border-color: var(--green-dark);
    color: #fff;

  source: "journal",
  topics: ["암위험", "치료", "진단"],
  abstract_ko: "1형 위 신경내분비종양(gNET)은 예후가 양호한 것으로 알려져 있습니다. 본 연구는 2014~2024년 3차 의료기관에서 진단된 1형 gNET 환자 23명(병변 36개)을 후향적으로 분석한 실제 임상 경험을 보고합니다. 중앙 종양 크기 7mm(범위 2~20mm)로, 29개는 G1, 7개는 G2였습니다. 내시경 절제(34병변)와 수술(2병변)로 치료하였으며, 중앙 추적기간 14개월 동안 6명 환자에서 10건의 국소 재발이 있었으나 모두 G1이었고, 원격전이 및 종양 관련 사망은 없었습니다. 수술 전 내시경초음파(EUS) 시행이 1건에서만 치료 방침을 변경시켰으며, 향후 위험도 계층화를 위한 연구가 필요합니다.",
  keypoints: [
    "연구 결과: 23명 환자, 36병변 — 중앙 크기 7mm(범위 2~20mm), G1 29개(80.6%), G2 7개(19.4%); 내시경 절제 34병변(hot-EMR 22, 겸자 5, 냉올가미 4, ESD 1, hybrid-ESD 1), 수술 2병변; 추적 중 10건 국소재발(6명, 55.5%) — 모두 G1, 원격전이·종양사망 없음",
    "EUS 역할 재고: 수술 전 EUS 13건 시행 중 1건(20mm G1)에서만 림프절 전이 확인 → 수술 방침 변경; 나머지 12건은 음성 결과로 방침 변경 없음 — EUS가 치료 방침을 실질적으로 변경하는 경우는 드물며, 비용·대기시간 증가 고려 시 적응증 재검토 필요",

  journal: "Frontiers in Medicine",

  source: "journal",
  topics: ["병인기전", "암위험", "병리"],
  abstract_ko: "산화적 스트레스는 염증성·자가면역 질환의 특징으로 위축성위염 진행에 관여합니다. 본 연구는 자가면역성위축성위염(AAG) 70명과 다병소위축성위염(MAG) 50명을 대상으로 산화적 스트레스 패턴을 비교하였습니다. 혈청 활성산소대사물(dROM), 산화단백질산물(AOPP), 일산화질소(NO), 조직 사이토카인(IL-10, TNFα), 유전체 손상 지표인 8-수산화탈산소구아노신(8-OHdG)을 측정하였습니다. 두 군 간 dROM·NO·AOPP 수준에는 유의한 차이가 없었으나, 8-OHdG는 MAG에서 AAG보다 유의하게 높았으며(p=0.001), IL-10도 MAG에서 높았습니다(p=0.008). 이는 AAG에서 유전체 산화 손상이 적어 선암 위험이 낮은 기전을 설명합니다.",
  keypoints: [
    "핵심 발견: 8-OHdG(유전체 산화 손상 지표)가 MAG 환자에서 AAG보다 유의하게 높음(중앙값 16.2 vs. 10.75 adducts/10의5승 dG, p=0.001) — 절단값 28.1에서 AAG와 MAG 감별 정확도 77%, 특이도 92.5%(오즈비 0.08, p=0.0002)",
    "AAG 내 산화 스트레스 패턴: 조기 OLGA 병기(0~1) AAG에서 진행 병기보다 dROM 수준 유의하게 높음(381.9 vs. 327.9 U, p=0.03) — 점막 위축이 진행될수록 산화 스트레스 표적(위 점막)이 소실되어 자유라디칼 생성 감소",
    "ECL 과증식과 산화 스트레스: AAG에서 ECL 과증식 초기(0~2) 단계에서 dROM 및 AOPP 수준이 진행 단계(3~5)보다 유의하게 높음(p=0.02, p=0.008) — AOPP가 신항원 형성을 유도해 초기 자가면역 반응을 유지하는 역할 가능",
    "MAG에서 높은 IL-10: 조직 IL-10이 MAG에서 AAG보다 유의하게 높음(중앙값 114.02 vs. 45.0 pg/mL, p=0.008) — 헬리코박터 감염에 의한 대식세포 동원·만성 염증에 대한 방어 반응으로 해석; TNFα는 두 군 간 차이 없음",
    "임상적 의의: 대식세포 침윤이 주된 MAG에서는 8-OHdG 매개 유전체 손상→선암 진행 경로가 활성화되는 반면, 림프구 매개 염증이 주된 AAG에서는 이 경로가 억제되어 선암 위험 낮음 — AAG의 종양 위험은 ECL 세포 과증식을 통한 유형 1 카르시노이드에 집중"

  abstract_ko: "자가면역성위염(AIG)과 자가면역성간질환(AILD) — 자가면역간염(AIH), 원발성담즙성담관염(PBC), 원발성경화성담관염(PSC) — 은 모두 만성 장기특이적 면역매개 질환입니다. 본 전향적 연구는 AILD 환자 104명을 대상으로 항벽세포항체(APCA) 선별검사를 시행하고, 양성자에서 상부위장관 내시경 및 조직검사로 AIG를 확인하였습니다. APCA 양성률은 22.1%였으며, 양성자의 91.3%에서 조직학적 AIG가 확인되었습니다. 장상피화생은 95.7%에서 관찰되었고, PBC가 APCA 양성군에서 불균형적으로 높은 비율(47.8%)을 차지했습니다.",

    "PBC와의 연관성: APCA 양성군에서 원발성담즙성담관염(PBC) 비율이 47.8%로, 전체 AILD 코호트(39.0%)보다 높음(비유의적) — 일반 인구에서 항벽세포항체 양성 시 조직학적 AIG 확인율이 50~60%인 데 반해, 본 AILD 코호트에서는 91.3%로 현저히 높아 AILD 환자가 고위험군임을 시사",

  source: "journal",
  topics: ["증례", "암위험", "병인기전"],
  abstract_ko: "본 논문은 자가면역성위염(AIG)과 헬리코박터 파일로리(H. pylori) 관련 위염이 공존하는 4증례를 보고하며, 모든 증례에서 위 종양이 발생했고 일부에서는 복수의 조직학적 기원을 가진 종양이 관찰되었습니다. 서술적 문헌 고찰을 통해 이 맥락에서의 종양 발생 기전과 임상적 의의를 탐구합니다. AIG와 H. pylori 위염의 공존이 상승적 점막 손상을 통해 이질적 신생물을 유발할 수 있음을 강조하며, 이 환자군에서 보다 적극적인 내시경 감시가 필요함을 제언합니다.",

function toggleSortMenu() {
  const menu = document.getElementById("sort-menu");
  const btn  = document.getElementById("sort-btn");
  const isOpen = menu.classList.toggle("open");
  btn.classList.toggle("open", isOpen);
  if (isOpen) {
    setTimeout(() => document.addEventListener("click", closeSortOnOutside), 0);
  }
}
function closeSortOnOutside(e) {
  if (!document.getElementById("sort-menu").contains(e.target) &&
      !document.getElementById("sort-btn").contains(e.target)) {
    document.getElementById("sort-menu").classList.remove("open");
    document.getElementById("sort-btn").classList.remove("open");
    document.removeEventListener("click", closeSortOnOutside);
  }
}
function setSort(key, label) {
  activeSort = key;
  currentPage = 1;
  document.getElementById("sort-label").textContent = label;
  document.querySelectorAll(".sort-option").forEach(o => {
    o.classList.toggle("active", o.dataset.sort === key);
  });
  document.getElementById("sort-menu").classList.remove("open");
  document.getElementById("sort-btn").classList.remove("open");
  renderPapers();
}
function getSorted(list) {
  if (activeSort === "year") return [...list].sort((a,b) => b.year - a.year || b.id - a.id);
  if (activeSort === "if")   return [...list].sort((a,b) => (b.if||0) - (a.if||0));
  return list; // default: insertion order
}

    const searchOk = !q
      || p.title.toLowerCase().includes(q)
      || p.title_ko.includes(q)
      || p.authors.toLowerCase().includes(q)
      || p.abstract_ko.includes(q)
      || p.topics.some(t => t.includes(q));
    return topicOk && sourceOk && searchOk;
  });
}

function renderPapers() {
  const list = document.getElementById("papers-list");
  const filtered = getSorted(getFiltered());
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));

  // 현재 페이지가 범위를 벗어나면 보정
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById("results-count").textContent = total + "편";
  document.getElementById("stat-total").textContent = PAPERS.length;

  const topicLabel = activeTopic === "all" ? "전체 논문" :
    TOPICS.find(t => t.id === activeTopic)?.label + " 논문";
  document.getElementById("results-title").textContent =
    searchQuery ? `"${searchQuery}" 검색 결과` : topicLabel;

  if (!pageItems.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">해당 조건의 논문이 없습니다.</div>
    </div>`;
    document.getElementById("pagination").innerHTML = "";
    document.getElementById("page-info").textContent = "";
    return;
  }

  list.innerHTML = pageItems.map((p, i) => {
    const srcLabel = SOURCE_LABELS[p.source] || p.source;
    const allBadges = [srcLabel, ...p.topics];
    const badgeHtml = allBadges.slice(0,4).map(b =>
      `<span class="badge ${BADGE_COLORS[b] || 'badge-gray'}">${b}</span>`
    ).join("");
    return `<article class="paper-card" style="animation-delay:${i*40}ms"
      onclick="openDetail(${p.id})">
      <div class="card-top">
        <div class="card-journal">${p.journal_short}${p.if ? `<span class="if-badge">IF ${p.if}</span>` : ''}</div>
        <div class="card-year">${p.year}</div>
      </div>
      <div class="card-title">${p.title_ko}</div>
      <div class="card-title-en">${p.title}</div>
      <div class="card-authors">${p.authors}</div>
      <div class="card-abstract">${p.abstract_ko}</div>
      <div class="card-footer">
        <div class="badge-row">${badgeHtml}</div>
        <span class="card-arrow">→</span>
      </div>
    </article>`;
  }).join("");

  // 페이지네이션 렌더
  renderPagination(totalPages);

  // 페이지 정보 표시
  const endNum = Math.min(start + PAGE_SIZE, total);
  document.getElementById("page-info").textContent =
    `전체 ${total}편 중 ${start + 1}–${endNum}편`;
}

function renderPagination(totalPages) {
  const nav = document.getElementById("pagination");
  if (totalPages <= 1) { nav.innerHTML = ""; return; }

  const cp = currentPage;
  let pages = [];

  // 항상 1페이지
  pages.push(1);
  // 현재 주변 ±2
  for (let i = Math.max(2, cp - 2); i <= Math.min(totalPages - 1, cp + 2); i++) {
    pages.push(i);
  }
  // 항상 마지막 페이지
  if (totalPages > 1) pages.push(totalPages);

  // 중복 제거 후 정렬
  pages = [...new Set(pages)].sort((a, b) => a - b);

  let html = "";

  // 이전 버튼
  html += `<button class="page-btn" onclick="goPage(${cp - 1})" ${cp === 1 ? 'disabled' : ''}>‹</button>`;

  // 페이지 번호 + 말줄임
  let prev = 0;
  for (const p of pages) {
    if (p - prev > 1) html += `<span class="page-ellipsis">…</span>`;
    html += `<button class="page-btn ${p === cp ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  }

  // 다음 버튼
  html += `<button class="page-btn" onclick="goPage(${cp + 1})" ${cp === totalPages ? 'disabled' : ''}>›</button>`;

  nav.innerHTML = html;
}

function goPage(n) {
  const filtered = getSorted(getFiltered());
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  currentPage = Math.max(1, Math.min(n, totalPages));
  renderPapers();
  // 목록 상단으로 부드럽게 스크롤
  document.getElementById("papers-list").scrollIntoView({ behavior: "smooth", block: "start" });
}

function saveNewPaper() {
  const journal    = document.getElementById("af-journal").value.trim();
  const year       = parseInt(document.getElementById("af-year").value);
  const title      = document.getElementById("af-title").value.trim();
  const title_ko   = document.getElementById("af-title-ko").value.trim();
  const abstract_ko = document.getElementById("af-abstract").value.trim();

  if (!journal || !year || !title || !title_ko || !abstract_ko) {
    alert("* 표시된 필수 항목을 입력해 주세요.");
    return;
  }

  const journal_short = document.getElementById("af-journal-short").value.trim() || journal;
  const authors  = document.getElementById("af-authors").value.trim() || "";
  const doi      = document.getElementById("af-doi").value.trim().replace(/^https?:\/\/doi\.org\//,"") || "";
  const source   = document.getElementById("af-source").value;
  const kpRaw    = document.getElementById("af-keypoints").value.trim();
  const keypoints = kpRaw ? kpRaw.split("\n").map(s => s.trim()).filter(Boolean) : [];
  const topics   = [...document.querySelectorAll(".topic-check:checked")].map(c => c.value);

  const newId = PAPERS.length > 0 ? Math.max(...PAPERS.map(p => p.id)) + 1 : 1;
  const paper = {
    id: newId, title, title_ko, journal, journal_short,
    year, authors, doi, source, topics,
    abstract_ko, keypoints, meta: {}
  };

  PAPERS.push(paper);
  renderTopics();
  renderPapers();
  document.getElementById("stat-total").textContent = PAPERS.length;
  document.getElementById("stat-year").textContent = Math.max(...PAPERS.map(p => p.year));

  // Generate export code
  const code = JSON.stringify(paper, null, 2)
    .replace(/"([^"]+)":/g, '$1:')
    .replace(/"/g, '"');
  document.getElementById("export-box").textContent = code;
  document.getElementById("add-form-section").style.display = "none";
  document.getElementById("add-success").style.display = "block";
  // 성공 화면이 보이도록 모달 상단으로 스크롤
  document.getElementById("add-modal").scrollTop = 0;
}

function copyExport() {
  const text = document.getElementById("export-box").textContent;
  // clipboard API가 로컬 파일에서 막힐 경우 fallback
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector(".btn-copy-export");
      btn.textContent = "✓ 복사됨!";
      setTimeout(() => btn.textContent = "📋 코드 복사하기", 2000);
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand("copy");
    const btn = document.querySelector(".btn-copy-export");
    btn.textContent = "✓ 복사됨!";
    setTimeout(() => btn.textContent = "📋 코드 복사하기", 2000);
  } catch(e) {
    alert("자동 복사가 지원되지 않습니다.\n아래 코드 박스를 클릭 후 Ctrl+A → Ctrl+C 로 직접 복사해 주세요.");
  }
  document.body.removeChild(ta);
}

function ttsGetVoice() {
  const voices = speechSynthesis.getVoices();
  const koVoices = voices.filter(v => v.lang.startsWith('ko'));
  if (koVoices.length) {
    const maleHint = koVoices.find(v => /남성|male|junho|준호|남자/i.test(v.name));
    if (maleHint) return maleHint;
    const nonFemale = koVoices.filter(v => !/여성|female|yuna|혜준|지현|유나|여자/i.test(v.name));
    return nonFemale.length ? nonFemale[0] : koVoices[0];
  }
  const maleAny = voices.find(v => /male|man|남성/i.test(v.name));
  return maleAny || voices[0] || null;
}

    'ANA':  '항핵항체',
    'AMA':  '항미토콘드리아항체',
    'AOPP': '산화단백질산물',
    'dROM': '활성산소대사물',
    'GNET': '위신경내분비종양',
    'GNETs': '위신경내분비종양',
    'MEN1': '다발성내분비종양1형',
    'GC':   '위암',
    'PGI/PGII': '펩시노겐 원투 비율',
    'PGI/II': '펩시노겐 원투 비율',
    'PG-I/PG-II': '펩시노겐 원투 비율',
    'PG-I/II': '펩시노겐 원투 비율',
    'PG1/PG2': '펩시노겐 원투 비율',
    'PG1/2': '펩시노겐 원투 비율',
    'PGII': '펩시노겐 투',
    'PGI':  '펩시노겐 원',
    'PG-II': '펩시노겐 투',
    'PG-I': '펩시노겐 원',
    'PG2':  '펩시노겐 투',
    'PG1':  '펩시노겐 원',
    'GNL':  '위신생물성병변',
    'GNLs': '위신생물성병변',
    'IEN':  '상피내신생물',
    'SVM':  '서포트벡터머신',
    'P-CAB': '포타슘경쟁적산차단제',
    'GA-FG': '위저선형위선암',
    'SMT':   '점막하종양',
    'NPV':   '음성예측도',
    'PPV':   '양성예측도',
    'LR':    '우도비',
    'ACAG': '자가면역성만성위축성위염',
    'OLGIM': '올짐',
    'OLGA': '올가',
    'GERD': '위식도역류질환',
    'APCA': '항벽세포항체',
    'AIFA': '내인인자항체',
    'Tregs': '조절T세포',
    'Treg': '조절T세포',
    'AIRE': '자가면역조절유전자',
    'AIG': '자가면역성위염',
    'AUC': '곡선하면적',
    'BMI': '체질량지수',
    'GIM': '위장상피화생',
    'HLA': '인간백혈구항원',
    'IBD': '염증성장질환',
    'IFA': '내인인자항체',
    'IFN': '인터페론',
    'IQR': '사분위범위',
    'NET': '신경내분비종양',
    'NPV': '음성예측도',
    'PCA': '항벽세포항체',
    'PPI': '양성자펌프억제제',
    'PPV': '양성예측도',
    'SIR': '표준화발생비',
    'SLE': '전신홍반루푸스',
    'AUC': '곡선하면적',
    'CI':  '신뢰구간',
    'HR':  '위험비',
    'IF':  '내인인자',
    'OR':  '오즈비',
    'RR':  '상대위험도',
    'SD':  '표준편차',
    'SE':  '표준오차',
  };

  let t = text;

  // 0. 공백 포함 PG 비율 패턴 (단어 경계 \b가 잡지 못하는 형태) — 먼저 처리
  // PG I/II, PG I / II, PG I/PG II 등 비율 표현
  t = t.replace(/PG\s*[–\-]?\s*I\s*[\/\·]\s*(?:PG\s*[–\-]?\s*)?II/gi, '펩시노겐 원투 비율');
  t = t.replace(/PG\s*I\s*[\/\·]\s*II/gi, '펩시노겐 원투 비율');
  t = t.replace(/펩시노겐\s*I\s*[\/\·]\s*II/g, '펩시노겐 원투 비율');
  t = t.replace(/펩시노겐\s*I\s*[\/\·]\s*펩시노겐\s*II/g, '펩시노겐 원투 비율');
  // PG II (공백 포함) — 비율 처리 후 개별 변환
  t = t.replace(/\bPG\s+II\b/gi, '펩시노겐 투');
  t = t.replace(/\bPG\s+I\b/gi, '펩시노겐 원');
  // 한글 '펩시노겐' 뒤에 바로 붙거나 공백 후 I/II 로마자
  t = t.replace(/펩시노겐\s*II\b/g, '펩시노겐 투');
  t = t.replace(/펩시노겐\s*I\b/g, '펩시노겐 원');

  // 1. 한글 뒤에 오는 괄호 내 약어 제거 (중복 읽기 방지)
  //    예: 자가면역성위염(AIG) → 자가면역성위염
  t = t.replace(/([가-힣]+)\s*\(([A-Za-z0-9\-\s/]+)\)/g, '$1');

  // 2. 약어 → 한글 변환 (단어 경계 기준, 긴 약어 우선 처리됨)
  for (const [abbr, full] of Object.entries(abbrevMap)) {
    t = t.replace(new RegExp('\\b' + abbr + '\\b', 'g'), full);
  }

  // 3. 괄호 처리 — 한글 포함 괄호만 유지, 나머지(통계값·약어 등)는 무음 삭제
  t = t.replace(/\(([^)]{1,120})\)/g, (match, inner) => {
    if (/[가-힣]/.test(inner)) return match;
    return ' ';
  });

  // 4. 천 단위 쉼표 숫자: 2,137 → 2137 (쉼표 제거 후 숫자로 읽힘)
  t = t.replace(/(\d{1,3}(?:,\d{3})+)/g, m => m.replace(/,/g, ''));

  // 5. 소수점 처리 — 정수부·소수부 모두 낱자로 읽기
  // 0.12 → 영 점 일 이 / 1.48 → 일 점 사 팔
  const digitKor = ['영','일','이','삼','사','오','육','칠','팔','구'];
  t = t.replace(/(\d+)\.(\d+)/g, (_, intPart, decPart) => {
    const intWord = intPart === '0' ? '영'
      : intPart.split('').map(d => digitKor[+d]).join(' ');
    const decWord = decPart.split('').map(d => digitKor[+d]).join(' ');
    return intWord + ' 점 ' + decWord;
  });

  // 6. 단위 읽기
  const unitMap = [
    [/(\d+(?:\.\d+)?)\s*µg\/[Ll]/g,      (_, n) => n + ' 마이크로그램퍼리터'],
    [/(\d+(?:\.\d+)?)\s*µg\/d[Ll]/g,     (_, n) => n + ' 마이크로그램퍼데시리터'],
    [/(\d+(?:\.\d+)?)\s*ng\/m[Ll]/g,     (_, n) => n + ' 나노그램퍼밀리리터'],
    [/(\d+(?:\.\d+)?)\s*pg\/m[Ll]/g,     (_, n) => n + ' 피코그램퍼밀리리터'],
    [/(\d+(?:\.\d+)?)\s*pmol\/[Ll]/g,    (_, n) => n + ' 피코몰퍼리터'],
    [/(\d+(?:\.\d+)?)\s*nmol\/[Ll]/g,    (_, n) => n + ' 나노몰퍼리터'],
    [/(\d+(?:\.\d+)?)\s*µmol\/[Ll]/g,    (_, n) => n + ' 마이크로몰퍼리터'],
    [/(\d+(?:\.\d+)?)\s*mmol\/[Ll]/g,    (_, n) => n + ' 밀리몰퍼리터'],
    [/(\d+(?:\.\d+)?)\s*g\/d[Ll]/g,      (_, n) => n + ' 그램퍼데시리터'],
    [/(\d+(?:\.\d+)?)\s*µIU\/m[Ll]/g,    (_, n) => n + ' 마이크로아이유퍼밀리리터'],
    [/(\d+(?:\.\d+)?)\s*IU\/m[Ll]/g,     (_, n) => n + ' 아이유퍼밀리리터'],
    [/(\d+(?:\.\d+)?)\s*U\/m[Ll]/g,      (_, n) => n + ' 유닛퍼밀리리터'],
    [/(\d+(?:\.\d+)?)\s*µmol/g,           (_, n) => n + ' 마이크로몰'],
    [/(\d+(?:\.\d+)?)\s*µg/g,             (_, n) => n + ' 마이크로그램'],
    [/(\d+(?:\.\d+)?)\s*mg/g,             (_, n) => n + ' 밀리그램'],
    [/(\d+(?:\.\d+)?)\s*mm/g,             (_, n) => n + ' 밀리미터'],
    [/(\d+(?:\.\d+)?)\s*cm/g,             (_, n) => n + ' 센티미터'],
    [/adducts\/10[⁵5]?\s*dG/g,             () => '십만디옥시구아노신당 부가물'],
    [/no\.\s*adducts/g,                     () => '부가물 수'],
    [/U\s*CARR/g,                            () => '유 카'],
  ];
  for (const [pattern, replacer] of unitMap) {
    t = t.replace(pattern, replacer);
  }

  // ECL 세포 중복 읽기 방지
  t = t.replace(/장크롬친화성유사세포\s*세포/g, '장크롬친화성유사세포');
  // "비율 비율" 중복 제거 (펩시노겐 원투 비율 비율 등)
  t = t.replace(/비율\s*비율/g, '비율');

  // 7-0. 괄호 밖 등호 처리: X= 또는 X = → X는
  // 예: R=0.31 → R은 영점 31 / p=0.042 → p는 영점 042
  t = t.replace(/\b([A-Za-z²³⁰-⁹]{1,4})\s*=\s*/g, (_, v) => v + '은 ');

  // 7-0b. 한글 약어 변환 후 조사 교정
  // 한글로 끝나는 단어 뒤에 오는 영문 조사 대체
  // '자가면역성위염가' → '자가면역성위염이', '자가면역성위염는' → '자가면역성위염은' 등
  // 받침 있는 글자: 이/은/을/이/과/로/으로 / 받침 없는 글자: 가/는/를/야/와/로
  t = t.replace(/([\uAC00-\uD7A3])(가|이|은|는|을|를|과|와|로|으로|의|에서|에게|이다|입니다)\b/g, (match, lastChar, josa) => {
    const code = lastChar.charCodeAt(0);
    const hasBatchim = (code - 0xAC00) % 28 !== 0; // 받침 있으면 true
    const josakMap = {
      '가':  hasBatchim ? '이'  : '가',
      '이':  hasBatchim ? '이'  : '가',   // 중립 → 자동 선택
      '은':  hasBatchim ? '은'  : '는',
      '는':  hasBatchim ? '은'  : '는',
      '을':  hasBatchim ? '을'  : '를',
      '를':  hasBatchim ? '을'  : '를',
      '과':  hasBatchim ? '과'  : '와',
      '와':  hasBatchim ? '과'  : '와',
      '로':  hasBatchim ? (lastChar === 'ㄹ' ? '로' : '으로') : '로',
      '으로': hasBatchim ? '으로' : '로',
      '의':  '의',
      '에서': '에서',
      '에게': '에게',
      '이다': hasBatchim ? '이다' : '다',
      '입니다': '입니다',
    };
    return lastChar + (josakMap[josa] || josa);
  });

  // 7-0c. 고유어 수사 변환
  const nativeNumMap = {
    1:'한',2:'두',3:'세',4:'네',5:'다섯',6:'여섯',7:'일곱',8:'여덟',9:'아홉',10:'열',
    11:'열한',12:'열두',13:'열세',14:'열네',15:'열다섯',16:'열여섯',17:'열일곱',18:'열여덟',19:'열아홉',
    20:'스물',21:'스물한',22:'스물두',23:'스물세',24:'스물네',25:'스물다섯',
    30:'서른',40:'마흔',50:'쉰',60:'예순',70:'일흔',80:'여든',90:'아흔',
  };
  const nativeUnits = '가지|명|곳|개|건|마리|번|차례|가닥|군데|줄|쌍|켤레|조각|장|권|편|잔|병|그릇|봉지|포기|송이|마디|토막|덩어리|살|달|해';
  t = t.replace(
    new RegExp('(\\d+)\\s*(' + nativeUnits + ')(?=[\\s,.]|$)', 'g'),
    (_, num, unit) => {
      const n = parseInt(num, 10);
      const word = nativeNumMap[n];
      return word ? word + ' ' + unit : num + ' ' + unit;
    }
  );

  // 7-1. 슬래시 제거
  t = t.replace(/\s*\/\s*/g, ' ');
  t = t.replace(/\s*\\\s*/g, ' ');

  // 7. 기타 기호
  t = t.replace(/[·•→←↑↓※▶▷◆◇■□△▲▽▼]/g, ', ');
  // % → '퍼센트' (숫자 뒤 %만 '퍼센트'로 읽고, 기호는 유지)
  t = t.replace(/(\d+(?:\.\d+)?)%/g, '$1퍼센트');
  // + 기호 → '플러스'
  t = t.replace(/\s*\+\s*/g, ' 플러스 ');
  // 세미콜론·콜론 낭독 방지
  t = t.replace(/[;:]/g, ' ');

  // 8. 공백 정리
  t = t.replace(/,\s*/g, ', ');
  t = t.replace(/\s{2,}/g, ' ');

  return t.trim();
}

function ttsBuildSegments() {
  return [
    { label: '📄 제목', text: document.getElementById('p-title').textContent },
    { label: '📝 초록 요약', text: document.getElementById('p-abstract').textContent },
  ].filter(s => s.text.trim());
}

function ttsUpdateUI() {
  const total = ttsSegments.length;
  const i     = ttsIndex;
  const pct   = total ? Math.round((i / total) * 100) : 0;
  document.getElementById('tts-progress-fill').style.width  = pct + '%';
  document.getElementById('tts-progress-thumb').style.left  = pct + '%';
  document.getElementById('tts-seg-counter').textContent =
    total ? (i + 1) + ' / ' + total + ' 섹션' : '';
  if (total) {
    document.getElementById('tts-section-label').textContent = ttsSegments[i].label;
  }
}

function ttsSpeak(segment, sessionId, onEnd) {
  const utter = new SpeechSynthesisUtterance(ttsCleanText(segment.text));
  const voice = ttsGetVoice();
  if (voice) utter.voice = voice;
  utter.lang    = 'ko-KR';
  utter.rate    = 0.92;
  utter.pitch   = 0.88;
  utter.volume  = 1;
  // sessionId가 현재와 다르면 콜백 무시 → 중복 재생 방지
  const guard = () => { if (ttsPlayId === sessionId) onEnd(); };
  utter.onend   = guard;
  utter.onerror = guard;
  ttsUtter = utter;
  speechSynthesis.speak(utter);
}

function ttsPlaySegment(i) {
  if (i >= ttsSegments.length) { ttsFinish(); return; }
  ttsIndex = i;
  ttsUpdateUI();
  const myId = ttsPlayId;  // 현재 세션 ID 캡처
  ttsSpeak(ttsSegments[i], myId, () => {
    if (ttsPlaying && ttsPlayId === myId) ttsPlaySegment(i + 1);
  });
}

function ttsStart() {
  if (!window.speechSynthesis) {
    alert('이 브라우저는 음성 합성을 지원하지 않습니다.');
    return;
  }
  speechSynthesis.cancel();
  ttsSegments = ttsBuildSegments();
  if (!ttsSegments.length) return;
  ttsPlaying = true;
  ttsIndex   = 0;
  document.getElementById('tts-play-btn').classList.add('playing');
  document.getElementById('tts-icon').textContent = '⏸';
  setTimeout(() => ttsPlaySegment(0), 120);
}

function ttsPause() {
  ttsPlayId++;             // 진행 중인 콜백 무효화
  speechSynthesis.cancel(); // pause() 대신 cancel — 브라우저 호환성 확보
  ttsPlaying = false;
  document.getElementById('tts-play-btn').classList.remove('playing');
  document.getElementById('tts-icon').textContent = '▶';
  document.getElementById('tts-section-label').textContent = '⏸ ' + (ttsSegments[ttsIndex] ? ttsSegments[ttsIndex].label : '일시정지됨');
}

function ttsResume() {
  if (!ttsSegments.length) { ttsStart(); return; }
  ttsPlaying = true;
  document.getElementById('tts-play-btn').classList.add('playing');
  document.getElementById('tts-icon').textContent = '⏸';
  // 항상 현재 ttsIndex 섹션부터 재생 (처음으로 돌아가지 않음)
  ttsPlaySegment(ttsIndex);
}

function ttsToggle() {
  if (!ttsPlaying && !ttsSegments.length) {
    ttsStart();          // 최초 시작
  } else if (ttsPlaying) {
    ttsPause();          // 재생 중 → 일시정지
  } else {
    ttsResume();         // 일시정지 중 → 현재 섹션부터 재개
  }
}

// 이전/다음 섹션으로 이동
function ttsSkip(delta) {
  if (!ttsSegments.length) {
    ttsSegments = ttsBuildSegments();
    if (!ttsSegments.length) return;
  }
  const next = Math.max(0, Math.min(ttsSegments.length - 1, ttsIndex + delta));
  ttsPlayId++;  // 이전 콜백 무효화
  speechSynthesis.cancel();
  ttsIndex = next;
  ttsUpdateUI();
  if (ttsPlaying) {
    ttsPlaySegment(next);
  } else {
    document.getElementById('tts-section-label').textContent = ttsSegments[next].label;
  }
}

function ttsStop() {
  ttsPlayId++;  // 이전 콜백 모두 무효화
  speechSynthesis.cancel();
  ttsPlaying = false;
  ttsIndex   = 0;
  ttsSegments = [];
  document.getElementById('tts-play-btn').classList.remove('playing');
  document.getElementById('tts-icon').textContent = '▶';
  document.getElementById('tts-section-label').textContent = '🔊 음성으로 듣기';
  document.getElementById('tts-progress-fill').style.width = '0%';
  document.getElementById('tts-progress-thumb').style.left = '0%';
  document.getElementById('tts-seg-counter').textContent = '';
}

function ttsFinish() {
  ttsPlaying = false;
  document.getElementById('tts-play-btn').classList.remove('playing');
  document.getElementById('tts-icon').textContent = '▶';
  document.getElementById('tts-section-label').textContent = '✅ 읽기 완료';
  document.getElementById('tts-progress-fill').style.width = '100%';
  document.getElementById('tts-progress-thumb').style.left = '100%';
}

// 진행 바 클릭/터치로 섹션 이동
(function () {
  const bar = document.getElementById('tts-progress-bar');

  function seekFromEvent(e) {
    if (!ttsSegments.length) {
      ttsSegments = ttsBuildSegments();
      if (!ttsSegments.length) return;
    }
    const rect = bar.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const targetIdx = Math.min(ttsSegments.length - 1, Math.floor(ratio * ttsSegments.length));
    if (targetIdx === ttsIndex && ttsPlaying) return; // 같은 섹션 중복 실행 방지
    ttsPlayId++;  // 이전 콜백 무효화
    speechSynthesis.cancel();
    ttsIndex = targetIdx;
    ttsUpdateUI();
    if (ttsPlaying) {
      ttsPlaySegment(targetIdx);
    } else {
      document.getElementById('tts-section-label').textContent = ttsSegments[targetIdx].label;
    }
  }

  let dragging = false;
  bar.addEventListener('mousedown',  (e) => { dragging = true; seekFromEvent(e); });
  bar.addEventListener('touchstart', (e) => { dragging = true; seekFromEvent(e); }, { passive: true });
  window.addEventListener('mousemove',  (e) => { if (dragging) seekFromEvent(e); });
  window.addEventListener('touchmove',  (e) => { if (dragging) seekFromEvent(e); }, { passive: true });
  window.addEventListener('mouseup',   () => { dragging = false; });
  window.addEventListener('touchend',  () => { dragging = false; });
})();

// 패널 닫을 때 음성 중지
const _origCloseDetail = closeDetailBtn;
function closeDetailBtn() {
  ttsStop();
  document.getElementById("detail-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

// Voices가 늦게 로드되는 브라우저 대응
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => {};
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
renderTopics();
renderPapers();
document.getElementById("stat-total").textContent = PAPERS.length;
document.getElementById("stat-year").textContent = Math.max(...PAPERS.map(p => p.year));
document.getElementById("stat-topics").textContent = TOPICS.length - 1;
</script>
