<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자가면역성위염 — KAIG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark:  #085041;
    --green-mid:   #0F6E56;
    --green-light: #1D9E75;
    --green-pale:  #E1F5EE;
    --green-paler: #F0FAF6;
    --ink:         #1a1a1a;
    --ink-mid:     #4a4a4a;
    --ink-soft:    #7a7a7a;
    --rule:        rgba(0,0,0,0.08);
    --bg:          #f8f9f7;
    --white:       #ffffff;
    --amber:       #BA7517;
    --amber-pale:  #FAEEDA;
    --blue:        #185FA5;
    --blue-pale:   #E6F1FB;
    --coral:       #993C1D;
    --coral-pale:  #FAECE7;
    --radius-sm:   6px;
    --radius-md:   10px;
    --radius-lg:   16px;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--green-dark);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 rgba(255,255,255,0.08);
  }
  .header-inner {
    max-width: 820px;
    margin: 0 auto;
    padding: 14px 20px 12px;
  }
  .header-brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  .header-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .header-eng {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
    letter-spacing: 0.04em;
  }
  .search-wrap {
    position: relative;
  }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px;
    padding: 8px 36px 8px 14px;
    font-size: 13px;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: background 0.2s, border-color 0.2s;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.45); }
  .search-input:focus {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.35);
  }
  .search-icon {
    position: absolute;
    right: 11px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.5;
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .main-wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* ── TOPIC PILLS ── */
  .topics-section { margin-bottom: 20px; }
  .topics-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .topics-scroll {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .topic-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--white);
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
    box-shadow: var(--shadow-card);
  }
  .topic-pill:hover {
    border-color: var(--green-light);
    color: var(--green-dark);
  }
  .topic-pill.active {
    background: var(--green-dark);
    border-color: var(--green-dark);
    color: #fff;
    box-shadow: 0 2px 8px rgba(8,80,65,0.25);
  }
  .topic-pill .pill-icon { font-size: 13px; }
  .topic-pill .pill-count {
    background: rgba(0,0,0,0.08);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
  }
  .topic-pill.active .pill-count {
    background: rgba(255,255,255,0.2);
  }

  /* ── SOURCE TOGGLE ── */
  .source-section {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .source-label {
    font-size: 11px;
    color: var(--ink-soft);
    margin-right: 2px;
  }
  .source-chip {
    padding: 4px 11px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--white);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .source-chip:hover { border-color: var(--green-light); color: var(--green-dark); }
  .source-chip.active {
    background: var(--green-pale);
    border-color: var(--green-mid);
    color: var(--green-dark);
  }

  /* ── RESULTS HEADER ── */
  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .results-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }
  .results-count {
    font-size: 12px;
    color: var(--ink-soft);
  }

  /* ── PAPER CARDS ── */
  .papers-list { display: flex; flex-direction: column; gap: 10px; }

  .paper-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: var(--shadow-card);
    animation: fadeUp 0.3s ease both;
  }
  .paper-card:hover {
    border-color: rgba(15,110,86,0.25);
    box-shadow: 0 4px 20px rgba(8,80,65,0.1);
    transform: translateY(-1px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 7px;
  }
  .card-journal {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--green-mid);
    text-transform: uppercase;
  }
  .card-year {
    font-size: 10px;
    color: var(--ink-soft);
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.45;
    margin-bottom: 6px;
    font-family: 'Noto Serif KR', serif;
  }
  .card-title-en {
    font-size: 11px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .panel-title-en {
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.45;
    margin-bottom: 6px;
  }
  .card-authors {
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .card-abstract {
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.6;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .badge-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .badge-green  { background: var(--green-pale); color: var(--green-dark); }
  .badge-blue   { background: var(--blue-pale);  color: var(--blue); }
  .badge-amber  { background: var(--amber-pale); color: var(--amber); }
  .badge-gray   { background: #f0efea; color: #5F5E5A; }
  .badge-coral  { background: var(--coral-pale); color: var(--coral); }
  .badge-purple { background: #EEEDFE; color: #3C3489; }
  .card-arrow {
    font-size: 16px;
    color: var(--green-light);
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .paper-card:hover .card-arrow { transform: translateX(3px); }

  /* ── DETAIL PANEL ── */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(8,80,65,0.18);
    backdrop-filter: blur(2px);
    align-items: flex-end;
    justify-content: center;
  }
  .detail-overlay.open {
    display: flex;
    animation: overlayIn 0.2s ease;
  }
  @keyframes overlayIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .detail-panel {
    background: var(--white);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 820px;
    max-height: 88vh;
    overflow-y: auto;
    padding: 0 0 40px;
    animation: panelUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes panelUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .panel-handle {
    width: 36px;
    height: 4px;
    background: #ddd;
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .panel-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--rule);
  }
  .panel-journal {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--green-mid);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .panel-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .panel-authors {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .panel-badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .panel-body { padding: 18px 20px; }
  .panel-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
    margin-top: 18px;
  }
  .panel-section-title:first-child { margin-top: 0; }
  .panel-abstract {
    font-size: 13px;
    color: var(--ink-mid);
    line-height: 1.75;
    margin-bottom: 4px;
  }
  .panel-keypoints {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .panel-keypoints li {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.55;
  }
  .kp-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-light);
    margin-top: 5px;
    flex-shrink: 0;
  }
  .panel-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .meta-item {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .meta-label {
    font-size: 10px;
    color: var(--ink-soft);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .meta-value {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
  }
  .panel-actions {
    padding: 0 20px;
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .panel-btn {
    flex: 1;
    padding: 11px;
    border-radius: var(--radius-md);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--rule);
    background: var(--bg);
    color: var(--ink-mid);
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .panel-btn:hover { background: var(--green-pale); border-color: var(--green-mid); color: var(--green-dark); }
  .panel-btn.primary {
    background: var(--green-dark);
    border-color: var(--green-dark);
    color: #fff;
  }
  .panel-btn.primary:hover { background: var(--green-mid); }
  .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--bg);
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .close-btn:hover { background: var(--rule); }

  .sort-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sort-dropdown-wrap {
    position: relative;
  }
  .sort-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--white);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mid);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
    box-shadow: var(--shadow-card);
  }
  .sort-btn:hover, .sort-btn.open {
    border-color: var(--green-mid);
    color: var(--green-dark);
  }
  .sort-menu {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 6px);
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--radius-md);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 50;
    min-width: 140px;
    overflow: hidden;
    animation: fadeUp 0.15s ease;
  }
  .sort-menu.open { display: block; }
  .sort-option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 9px 14px;
    border: none;
    background: none;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink-mid);
    cursor: pointer;
    transition: background 0.1s;
  }
  .sort-option:hover { background: var(--green-paler); color: var(--green-dark); }
  .sort-option.active { color: var(--green-dark); font-weight: 600; }

  /* IF badge on card */
  .if-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--amber-pale);
    color: var(--amber);
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ── ADD MODAL ── */
  .add-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(8,80,65,0.22);
    backdrop-filter: blur(3px);
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .add-overlay.open { display: flex; animation: overlayIn 0.2s ease; }
  .add-modal {
    background: var(--white);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 620px;
    max-height: 96vh;
    overflow-y: auto;
    padding: 24px 22px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  }
  .add-modal h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .add-modal h2 span { font-size: 20px; }
  .add-field { margin-bottom: 13px; }
  .add-field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 5px;
  }
  .add-field label .req { color: var(--coral); margin-left: 2px; }
  .add-field input, .add-field textarea, .add-field select {
    width: 100%;
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    padding: 8px 11px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }
  .add-field input:focus, .add-field textarea:focus, .add-field select:focus {
    border-color: var(--green-mid);
    background: var(--white);
  }
  .add-field textarea { min-height: 80px; }
  .add-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .add-topics-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .topic-check {
    display: none;
  }
  .topic-check-label {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--white);
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-mid);
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }
  .topic-check:checked + .topic-check-label {
    background: var(--green-dark);
    border-color: var(--green-dark);
    color: #fff;
  }
  .add-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .add-actions button {
    flex: 1;
    padding: 11px;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .btn-cancel {
    border: 1px solid var(--rule);
    background: var(--bg);
    color: var(--ink-mid);
  }
  .btn-cancel:hover { background: #eee; }
  .btn-save {
    border: none;
    background: var(--green-dark);
    color: #fff;
  }
  .btn-save:hover { background: var(--green-mid); }
  .add-hint {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 4px;
  }
  .add-success {
    display: none;
    text-align: center;
    padding: 24px 0 8px;
  }
  .add-success .success-icon { font-size: 40px; margin-bottom: 10px; }
  .add-success p { font-size: 14px; color: var(--ink-mid); }
  .export-box {
    background: #f4f4f4;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 11px;
    color: #333;
    margin-top: 14px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 120px;
    overflow-y: auto;
    font-family: monospace;
    border: 1px solid #ddd;
  }
  .btn-copy-export {
    margin-top: 8px;
    padding: 7px 16px;
    background: var(--green-dark);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ── ADD PAPER BUTTON ── */
  .add-paper-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px;
    border: 1.5px dashed rgba(15,110,86,0.3);
    border-radius: var(--radius-lg);
    background: var(--green-paler);
    color: var(--green-mid);
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 6px;
  }
  .add-paper-btn:hover {
    border-color: var(--green-mid);
    background: var(--green-pale);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-soft);
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 13px; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 2px;
    margin-bottom: 18px;
  }
  .stat-item {
    flex: 1;
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    box-shadow: var(--shadow-card);
  }
  .stat-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--green-dark);
    font-family: 'Noto Serif KR', serif;
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--ink-soft);
  }

  /* scrollbar */
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

    "【내시경 진단 기준】 가상색소내시경(VCE: NBI·BLI·LCI) 사용 의무화 — VCE 유도 생검: 이형성 의심 시 필수(Rec 9) / 전암 병변 진단·병기 시 VCE 유도+무작위 생검 병용(Rec 10). 이형성 의심 병변은 Paris 분류·궤양 유무·크기·위치·혈관·점막 패턴 기술 및 포토문서화, 2개 표적 생검 필수(Rec 13). 실시간 AI 보조 진단 시스템 사용 가능(Rec 12, Conditional/Low)",
    "【내시경 절제 적응증 및 병리 위험 분류】 ESD는 분화형 이형성(LGD·HGD) 및 점막내암 모든 크기(비궤양)/≤30mm(궤양)에 표준 치료(Rec 26). 절제 후 병리 위험도: ①Very low-risk(LNM<0.5~1%): R0·pT1a·분화형·LVI음성 → 추가 처치 불필요 ②Low-risk(LNM<3%): R0·pT1b≤500μm·분화형·≤30mm 또는 pT1a·미분화·≤20mm·비궤양 → MDT 논의 ③Local-risk: 수평 절제연 양성/분할절제 → 내시경 감시·재치료 ④High-risk: 수직절제연 양성·LVI·심부 SM침윤>500μm·기타 → 수술 강력 고려(Rec 28)",
    "【전암 병변 추적 기준】 광범위 내시경 변화(Kimura C3+/EGGIM≥5) 또는 조직학 고위험(OLGA/OLGIM III/IV): 3년마다 고품질 내시경(Rec 31). 경등도~중등도 위축 또는 전정부 국한 GIM + 위험인자(가족력·불완전형 GIM·H. pylori 지속) 없음: 추적 불필요 — 임상에서 가장 흔한 군(Rec 34). 1촌 가족력 동반 고위험군: 1~2년 간격 강화 추적 고려(Rec 33). 유전성 증후군 보유자: 증후군별 권고 또는 점막 변화 기반 중 짧은 간격 적용(Rec 46)",
    "【H. pylori 및 비H. pylori 개입】 비위축·위축 위염 전체에서 H. pylori 제균 권고(Strong/High, Rec 38). 내시경·수술 치료 후 제균 필수(Strong/Moderate, Rec 40). 다른 미생물 검사 권고 안 함(Rec 41). 금연 권고(Strong/Low, Rec 42). 저용량 아스피린은 심혈관 고위험 선택 환자에서 위암 예방 고려 가능(Rec 44). 프로바이오틱스 포함 기타 보충제·약물 화학 예방 권고 안 함(Rec 45)"
  ],
  meta: {
    "가이드라인 유형": "ESGE·EHMSG·ESP 공동 가이드라인 (MAPS II + ESGE ESD 가이드라인 2022 통합 업데이트)",
    "출판일": "2025년 3월 20일 온라인 (Endoscopy 2025;57:504-554)",
    "권고안 수": "총 48개 (GRADE 기반, 1~48번)",
    "검토 예정": "2030년 (또는 새로운 근거 발생 시 조기 업데이트)",
    "AIG 관련 권고": "Rec 47 (자가면역성위염 3년 추적), Rec 48 (CVID 추적), Rec 46 (유전성 증후군)",
    "연구 기관": "Portuguese Institute of Oncology of Porto 외 유럽 다기관"
  }
}
];

// ═══════════════════════════════════════════════
// TOPICS CONFIG — 주제 추가 시 여기에만 입력하세요
// ═══════════════════════════════════════════════
const TOPICS = [
  { id: "all",      label: "전체",          icon: "◎" },
  { id: "진단",     label: "진단",          icon: "🔬" },
  { id: "병리",     label: "병리·위축·화생", icon: "🧫" },
  { id: "치료",     label: "치료·보충",      icon: "💊" },
  { id: "암위험",   label: "암 위험도",      icon: "📊" },
  { id: "AI",       label: "인공지능",       icon: "🤖" },
  { id: "역학",     label: "역학·분류",      icon: "🌏" },
  { id: "헬리코박터", label: "헬리코박터",   icon: "🦠" },
  { id: "병인기전", label: "병인·기전",      icon: "🔭" },
  { id: "증례",    label: "증례",           icon: "🏥" },
  { id: "동반질환", label: "동반 자가면역질환", icon: "🫀" },
];

const BADGE_COLORS = {
  "저널 파일":  "badge-green",
  "KAIG":      "badge-blue",
  "인터넷":    "badge-amber",
  "진단":      "badge-blue",
  "병리":      "badge-amber",
  "치료":      "badge-green",
  "암위험":    "badge-gray",
  "AI":        "badge-amber",
  "역학":      "badge-blue",
  "헬리코박터": "badge-coral",
  "병인기전":   "badge-purple",
  "증례":       "badge-coral",
  "동반질환":   "badge-purple",
};

const SOURCE_LABELS = { journal: "저널 파일", kaig: "KAIG", web: "인터넷" };

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let activeTopic  = "all";
let activeSource = "all";
let searchQuery  = "";
let activeSort   = "default";

// ═══════════════════════════════════════════════
// SORT
// ═══════════════════════════════════════════════
function toggleSortMenu() {
  const menu = document.getElementById("sort-menu");
  const btn  = document.getElementById("sort-btn");
  const isOpen = menu.classList.toggle("open");
  btn.classList.toggle("open", isOpen);
  if (isOpen) {
    setTimeout(() => document.addEventListener("click", closeSortOnOutside), 0);
  }
}
function closeSortOnOutside(e) {
  if (!document.getElementById("sort-menu").contains(e.target) &&
      !document.getElementById("sort-btn").contains(e.target)) {
    document.getElementById("sort-menu").classList.remove("open");
    document.getElementById("sort-btn").classList.remove("open");
    document.removeEventListener("click", closeSortOnOutside);
  }
}
function setSort(key, label) {
  activeSort = key;
  document.getElementById("sort-label").textContent = label;
  document.querySelectorAll(".sort-option").forEach(o => {
    o.classList.toggle("active", o.dataset.sort === key);
  });
  document.getElementById("sort-menu").classList.remove("open");
  document.getElementById("sort-btn").classList.remove("open");
  renderPapers();
}
function getSorted(list) {
  if (activeSort === "year") return [...list].sort((a,b) => b.year - a.year || b.id - a.id);
  if (activeSort === "if")   return [...list].sort((a,b) => (b.if||0) - (a.if||0));
  return list; // default: insertion order
}

// ═══════════════════════════════════════════════
// RENDER TOPICS
// ═══════════════════════════════════════════════
function renderTopics() {
  const container = document.getElementById("topics-container");
  container.innerHTML = TOPICS.map(t => {
    const count = t.id === "all"
      ? PAPERS.length
      : PAPERS.filter(p => p.topics.includes(t.id)).length;
    return `<button class="topic-pill ${activeTopic === t.id ? 'active' : ''}"
      onclick="setTopic('${t.id}')">
      <span class="pill-icon">${t.icon}</span>
      ${t.label}
      <span class="pill-count">${count}</span>
    </button>`;
  }).join("");
}

// ═══════════════════════════════════════════════
// RENDER PAPERS
// ═══════════════════════════════════════════════
function getFiltered() {
  return PAPERS.filter(p => {
    const topicOk  = activeTopic === "all" || p.topics.includes(activeTopic);
    const sourceOk = activeSource === "all" || p.source === activeSource;
    const q = searchQuery.toLowerCase();
    const searchOk = !q
      || p.title.toLowerCase().includes(q)
      || p.title_ko.includes(q)
      || p.authors.toLowerCase().includes(q)
      || p.abstract_ko.includes(q)
      || p.topics.some(t => t.includes(q));
    return topicOk && sourceOk && searchOk;
  });
}

function renderPapers() {
  const list = document.getElementById("papers-list");
  const filtered = getSorted(getFiltered());

  document.getElementById("results-count").textContent = filtered.length + "편";
  document.getElementById("stat-total").textContent = PAPERS.length;

  const topicLabel = activeTopic === "all" ? "전체 논문" :
    TOPICS.find(t => t.id === activeTopic)?.label + " 논문";
  document.getElementById("results-title").textContent =
    searchQuery ? `"${searchQuery}" 검색 결과` : topicLabel;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">해당 조건의 논문이 없습니다.</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map((p, i) => {
    const srcLabel = SOURCE_LABELS[p.source] || p.source;
    const allBadges = [srcLabel, ...p.topics];
    const badgeHtml = allBadges.slice(0,4).map(b =>
      `<span class="badge ${BADGE_COLORS[b] || 'badge-gray'}">${b}</span>`
    ).join("");
    return `<article class="paper-card" style="animation-delay:${i*50}ms"
      onclick="openDetail(${p.id})">
      <div class="card-top">
        <div class="card-journal">${p.journal_short}${p.if ? `<span class="if-badge">IF ${p.if}</span>` : ''}</div>
        <div class="card-year">${p.year}</div>
      </div>
      <div class="card-title">${p.title_ko}</div>
      <div class="card-title-en">${p.title}</div>
      <div class="card-authors">${p.authors}</div>
      <div class="card-abstract">${p.abstract_ko}</div>
      <div class="card-footer">
        <div class="badge-row">${badgeHtml}</div>
        <span class="card-arrow">→</span>
      </div>
    </article>`;
  }).join("");
}

// ═══════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════
function openDetail(id) {
  const p = PAPERS.find(x => x.id === id);
  if (!p) return;

  document.getElementById("p-journal").innerHTML =
    p.journal + " · " + p.year +
    (p.if ? ` <span class="if-badge">IF ${p.if}</span>` : "");
  document.getElementById("p-title").textContent = p.title_ko;
  document.getElementById("p-title-en").textContent = p.title;
  document.getElementById("p-authors").textContent = p.authors;

  const srcLabel = SOURCE_LABELS[p.source] || p.source;
  const allBadges = [srcLabel, ...p.topics];
  document.getElementById("p-badges").innerHTML = allBadges.map(b =>
    `<span class="badge ${BADGE_COLORS[b] || 'badge-gray'}">${b}</span>`
  ).join("");

  document.getElementById("p-abstract").textContent = p.abstract_ko;

  document.getElementById("p-keypoints").innerHTML = p.keypoints.map(k =>
    `<li><span class="kp-dot"></span><span>${k}</span></li>`
  ).join("");

  const metaEntries = [
    ...Object.entries(p.meta),
    ["DOI", p.doi]
  ];
  document.getElementById("p-meta").innerHTML = metaEntries.map(([k,v]) =>
    `<div class="meta-item">
      <div class="meta-label">${k}</div>
      <div class="meta-value">${v}</div>
    </div>`
  ).join("");

  const linkBtn = document.getElementById("p-link-btn");
  linkBtn.onclick = () => window.open("https://doi.org/" + p.doi, "_blank");

  document.getElementById("detail-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeDetail(e) {
  if (e.target === document.getElementById("detail-overlay")) closeDetailBtn();
}
function closeDetailBtn() {
  document.getElementById("detail-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

// ═══════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════
function setTopic(id) {
  activeTopic = id;
  renderTopics();
  renderPapers();
}

document.querySelectorAll(".source-chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".source-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    activeSource = chip.dataset.src;
    renderPapers();
  });
});

document.getElementById("search-input").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  renderPapers();
});

// ═══════════════════════════════════════════════
// ADD PAPER MODAL
// ═══════════════════════════════════════════════
function openAddMode() {
  // Build topic checkboxes
  const grid = document.getElementById("add-topics-grid");
  grid.innerHTML = TOPICS.filter(t => t.id !== "all").map(t =>
    `<input type="checkbox" class="topic-check" id="ck-${t.id}" value="${t.id}">
     <label class="topic-check-label" for="ck-${t.id}">${t.icon} ${t.label}</label>`
  ).join("");

  document.getElementById("add-form-section").style.display = "";
  document.getElementById("add-success").style.display = "none";
  document.getElementById("add-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
  // 항상 폼 상단부터 보이도록
  setTimeout(() => { document.getElementById("add-modal").scrollTop = 0; }, 10);
}

function closeAddModal(e) {
  if (e.target === document.getElementById("add-overlay")) closeAddModalBtn();
}
function closeAddModalBtn() {
  document.getElementById("add-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

function saveNewPaper() {
  const journal    = document.getElementById("af-journal").value.trim();
  const year       = parseInt(document.getElementById("af-year").value);
  const title      = document.getElementById("af-title").value.trim();
  const title_ko   = document.getElementById("af-title-ko").value.trim();
  const abstract_ko = document.getElementById("af-abstract").value.trim();

  if (!journal || !year || !title || !title_ko || !abstract_ko) {
    alert("* 표시된 필수 항목을 입력해 주세요.");
    return;
  }

  const journal_short = document.getElementById("af-journal-short").value.trim() || journal;
  const authors  = document.getElementById("af-authors").value.trim() || "";
  const doi      = document.getElementById("af-doi").value.trim().replace(/^https?:\/\/doi\.org\//,"") || "";
  const source   = document.getElementById("af-source").value;
  const kpRaw    = document.getElementById("af-keypoints").value.trim();
  const keypoints = kpRaw ? kpRaw.split("\n").map(s => s.trim()).filter(Boolean) : [];
  const topics   = [...document.querySelectorAll(".topic-check:checked")].map(c => c.value);

  const newId = PAPERS.length > 0 ? Math.max(...PAPERS.map(p => p.id)) + 1 : 1;
  const paper = {
    id: newId, title, title_ko, journal, journal_short,
    year, authors, doi, source, topics,
    abstract_ko, keypoints, meta: {}
  };

  PAPERS.push(paper);
  renderTopics();
  renderPapers();
  document.getElementById("stat-total").textContent = PAPERS.length;
  document.getElementById("stat-year").textContent = Math.max(...PAPERS.map(p => p.year));

  // Generate export code
  const code = JSON.stringify(paper, null, 2)
    .replace(/"([^"]+)":/g, '$1:')
    .replace(/"/g, '"');
  document.getElementById("export-box").textContent = code;
  document.getElementById("add-form-section").style.display = "none";
  document.getElementById("add-success").style.display = "block";
  // 성공 화면이 보이도록 모달 상단으로 스크롤
  document.getElementById("add-modal").scrollTop = 0;
}

function addAnotherPaper() {
  // Reset form
  ["af-journal","af-journal-short","af-year","af-title","af-title-ko",
   "af-authors","af-doi","af-abstract","af-keypoints"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("af-source").value = "journal";
  document.querySelectorAll(".topic-check").forEach(c => c.checked = false);
  document.getElementById("add-form-section").style.display = "";
  document.getElementById("add-success").style.display = "none";
}

function copyExport() {
  const text = document.getElementById("export-box").textContent;
  // clipboard API가 로컬 파일에서 막힐 경우 fallback
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector(".btn-copy-export");
      btn.textContent = "✓ 복사됨!";
      setTimeout(() => btn.textContent = "📋 코드 복사하기", 2000);
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand("copy");
    const btn = document.querySelector(".btn-copy-export");
    btn.textContent = "✓ 복사됨!";
    setTimeout(() => btn.textContent = "📋 코드 복사하기", 2000);
  } catch(e) {
    alert("자동 복사가 지원되지 않습니다.\n아래 코드 박스를 클릭 후 Ctrl+A → Ctrl+C 로 직접 복사해 주세요.");
  }
  document.body.removeChild(ta);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
renderTopics();
renderPapers();
document.getElementById("stat-total").textContent = PAPERS.length;
document.getElementById("stat-year").textContent = Math.max(...PAPERS.map(p => p.year));
document.getElementById("stat-topics").textContent = TOPICS.length - 1;
</script>
